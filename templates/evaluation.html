{% extends 'base.html' %}

{% block title %}Évaluation initiale{% endblock %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-9">
                <div class="form-card">
                    <div class="mb-4">
                        <h1 class="h2 mb-2">Évaluation initiale</h1>
                        <p class="text-muted mb-0">
                            Remplissez ce formulaire pour une première analyse de votre profil et de vos objectifs.
                        </p>
                    </div>

                    <form method="POST" action="{{ url_for('evaluation') }}">
                        <fieldset class="mb-4">
                            <legend class="section-legend">Informations personnelles</legend>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="prenom" class="form-label">Prénom</label>
                                    <input type="text" class="form-control" id="prenom" name="prenom" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="nom" class="form-label">Nom</label>
                                    <input type="text" class="form-control" id="nom" name="nom" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>

                                <div class="col-md-3">
                                    <label for="age" class="form-label">Âge</label>
                                    <input type="number" class="form-control" id="age" name="age" required>
                                </div>

                                <div class="col-md-3">
                                    <label for="sexe" class="form-label">Sexe</label>
                                    <select class="form-select" id="sexe" name="sexe" required>
                                        <option value="" selected disabled>Choisir</option>
                                        <option value="M">Masculin</option>
                                        <option value="F">Féminin</option>
                                        <option value="Autre">Autre</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="niveau" class="form-label">Niveau</label>
                                    <select class="form-select" id="niveau" name="niveau" required>
                                        <option value="" selected disabled>Choisir</option>
                                        <option value="debutant">Débutant</option>
                                        <option value="intermediaire">Intermédiaire</option>
                                        <option value="avance">Avancé</option>
                                    </select>
                                </div>
                            </div>
                        </fieldset>

                        <fieldset class="mb-4">
                            <legend class="section-legend">Données physiques</legend>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="taille" class="form-label">Taille (cm)</label>
                                    <input type="number" class="form-control" id="taille" name="taille" step="0.1" min="0" max ="300" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="poids" class="form-label">Poids (kg)</label>
                                    <input type="number" class="form-control" id="poids" name="poids" step="0.1" min="0" required>
                                </div>
                            </div>
                        </fieldset>

                        <fieldset class="mb-4">
                            <legend class="section-legend">Habitudes de vie</legend>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="heures_sommeil" class="form-label">Heures de sommeil par nuit</label>
                                    <input type="number" class="form-control" id="heures_sommeil" name="heures_sommeil" step="1"  required>
                                </div>

                                <div class="col-md-6">
                                    <label for="repas_par_jour" class="form-label">Repas par jour</label>
                                    <input type="number" class="form-control" id="repas_par_jour" name="repas_par_jour" min="0" required>
                                </div>

                                <div class="col-12">
                                    <label for="frequence_activite" class="form-label">Fréquence d'activité</label>
                                    <select class="form-select" id="frequence_activite" name="frequence_activite" required>
                                        <option value="" selected disabled>Choisir</option>
                                        <option value="faible">Faible</option>
                                        <option value="moderee">Modérée</option>
                                        <option value="elevee">Élevée</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label for="objectif" class="form-label">Objectif</label>
                                    <textarea
                                        class="form-control"
                                        id="objectif"
                                        name="objectif"
                                        rows="5"
                                        placeholder="Décrivez votre objectif, vos habitudes, votre contexte et le plus d'informations utiles possible."
                                        required
                                    ></textarea>
                                </div>
                            </div>
                        </fieldset>

                        <div class="d-grid d-md-flex justify-content-md-end gap-2">
                            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Retour</a>
                            <button type="submit" class="btn btn-primary px-4">Envoyer la demande</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
